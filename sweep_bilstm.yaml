program: train.py
method: bayes   # Bayesian optimization

metric:
  name: val_loss
  goal: minimize

# Limit total runs
run_cap: 4

early_terminate:
  type: hyperband
  min_iter: 5

parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 0.00001
    max: 0.01


  batch_size:
    values: [16, 32, 64]

  seq_len:
    values: [64, 128, 256]

  epochs:
    value: 20

  dropout:
    values: [0.2, 0.3, 0.5]

  lstm_units:
    values: [64, 128, 256]

  dense_units:
    values: [32, 64, 128]

  optimizer:
    values: [adam, rmsprop]

  num_layers:
    values: [1, 2]

  loss:
    values: [mse, mae, huber]

  use_attention:
    values: [true, false]

  mc_dropout:
    values: [true, false]
